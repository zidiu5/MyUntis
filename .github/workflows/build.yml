name: Build & Release APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Wichtig: Gibt GitHub das Recht, ein Release zu erstellen

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "MyUntis Neueste Version"
          body: "Automatisch aktualisierte Version direkt aus dem Master-Branch."
          draft: false
          prerelease: false
          files: app/build/outputs/apk/debug/MyUntis.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}